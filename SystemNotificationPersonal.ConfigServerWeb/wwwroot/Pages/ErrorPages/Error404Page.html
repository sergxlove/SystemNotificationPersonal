<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Styles/ErrorPage.css">
    <title>Система оповещения · 404</title>
</head>
<body>
    <div class="error-container">
        <div class="brand-header">
            <div class="logo-area">
                <div class="logo-icon">🔔⚠️</div>
                <div class="brand-title" data-i18n="title">Система оповещения</div>
                <div class="brand-sub" data-i18n="error">Ошибка</div>
            </div>
            <div class="header-right">
                <div class="lang-selector">
                    <div class="lang-btn" onclick="toggleLangDropdown()">
                        <span class="flag" id="currentLangFlag">🇷🇺</span>
                        <span id="currentLangName">Русский</span>
                        <span>▼</span>
                    </div>
                    <div class="lang-dropdown" id="langDropdown">
                        <div class="lang-option" onclick="setLanguage('ru')">
                            <span class="flag">🇷🇺</span>
                            <span class="lang-name">Русский</span>
                        </div>
                        <div class="lang-option" onclick="setLanguage('en')">
                            <span class="flag">🇬🇧</span>
                            <span class="lang-name">English</span>
                        </div>
                        <div class="lang-option" onclick="setLanguage('de')">
                            <span class="flag">🇩🇪</span>
                            <span class="lang-name">Deutsch</span>
                        </div>
                        <div class="lang-option" onclick="setLanguage('fr')">
                            <span class="flag">🇫🇷</span>
                            <span class="lang-name">Français</span>
                        </div>
                    </div>
                </div>
                <div class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
                    <span class="theme-icon">🌙</span>
                </div>
            </div>
        </div>
        <div class="error-main">
            <div class="error-bg-particles" id="particlesContainer"></div>
            <div class="error-code-wrapper">
                <div class="error-glitch">404</div>
                <div class="error-subtitle" data-i18n="notFound">Страница не найдена</div>
                <div class="error-message" data-i18n="message">
                    Запрашиваемая страница не существует или была перемещена.
                </div>
            </div>
            <div class="footer-note">
                <div class="status-msg">
                    <span class="status-dot"></span>
                    <span>Система оповещения · v1.0.0</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const translations = {
                ru: {
                    title: 'Система оповещения',
                    error: 'Ошибка',
                    notFound: 'Страница не найдена',
                    message: 'Запрашиваемая страница не существует или была перемещена.'
                },
                en: {
                    title: 'Notification System',
                    error: 'Error',
                    notFound: 'Page not found',
                    message: 'The requested page does not exist or has been moved.'
                },
                de: {
                    title: 'Benachrichtigungssystem',
                    error: 'Fehler',
                    notFound: 'Seite nicht gefunden',
                    message: 'Die angeforderte Seite existiert nicht oder wurde verschoben.'
                },
                fr: {
                    title: 'Système de notification',
                    error: 'Erreur',
                    notFound: 'Page non trouvée',
                    message: 'La page demandée n\'existe pas ou a été déplacée.'
                }
            };
            const flags = { ru: '🇷🇺', en: '🇬🇧', de: '🇩🇪', fr: '🇫🇷' };
            const langNames = { ru: 'Русский', en: 'English', de: 'Deutsch', fr: 'Français' };
            const state = {
                theme: localStorage.getItem('theme') || 'light',
                language: localStorage.getItem('language') || 'ru'
            };

            const elements = {
                langDropdown: document.getElementById('langDropdown'),
                currentLangFlag: document.getElementById('currentLangFlag'),
                currentLangName: document.getElementById('currentLangName')
            };
            applyTheme(state.theme);
            applyLanguage(state.language);
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.lang-selector')) {
                    elements.langDropdown.classList.remove('show');
                }
            });
            const particlesContainer = document.getElementById('particlesContainer');
            if (particlesContainer) {
                for (let i = 0; i < 15; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 60 + 20;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 8 + 's';
                    particle.style.animationDuration = (Math.random() * 6 + 6) + 's';
                    particlesContainer.appendChild(particle);
                }
            }
            const errorBadge = document.querySelector('.error-badge');
            if (errorBadge) {
                setInterval(() => {
                    errorBadge.style.transition = '0.2s';
                    errorBadge.style.opacity = '0.7';
                    errorBadge.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        errorBadge.style.opacity = '1';
                        errorBadge.style.transform = 'scale(1)';
                    }, 200);
                }, 4000);
            }
            window.toggleTheme = function () {
                state.theme = state.theme === 'light' ? 'dark' : 'light';
                applyTheme(state.theme);
                localStorage.setItem('theme', state.theme);
            };
            function applyTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                const icon = document.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'light' ? '🌙' : '☀️';
                }
            }
            window.toggleLangDropdown = function () {
                elements.langDropdown.classList.toggle('show');
            };
            window.setLanguage = function (lang) {
                state.language = lang;
                applyLanguage(lang);
                localStorage.setItem('language', lang);
                elements.langDropdown.classList.remove('show');
                elements.currentLangFlag.textContent = flags[lang];
                elements.currentLangName.textContent = langNames[lang];
            };
            function applyLanguage(lang) {
                document.documentElement.lang = lang;

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang]?.[key]) {
                        el.textContent = translations[lang][key];
                    }
                });
                elements.currentLangFlag.textContent = flags[lang];
                elements.currentLangName.textContent = langNames[lang];
            }
        })();
    </script>
</body>
</html>
